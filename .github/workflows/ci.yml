name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Lint, test, and build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Build Python package
        run: uv build

      - name: Verify Homebrew formula
        run: |
          ruby -c Formula/obs-web-widgets.rb
          brew style Formula/obs-web-widgets.rb
          uv run python - <<'PY'
          import re
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text())
          formula = Path("Formula/obs-web-widgets.rb").read_text()
          expected = project["project"]["version"]

          version = re.search(r'^  version "([^"]+)"$', formula, re.MULTILINE)
          tag = re.search(r'tag:\s+"v([^"]+)"', formula)

          assert version, "Formula version is missing"
          assert tag, "Formula tag is missing"
          assert version.group(1) == expected
          assert tag.group(1) == expected
          PY

      - name: Verify package resources
        run: |
          uv run python - <<'PY'
          from importlib.resources import files
          from obs_web_widgets.now_playing import now_playing_swift_path

          assert files("obs_web_widgets").joinpath("templates", "config.html").is_file()
          assert files("obs_web_widgets").joinpath("templates", "lyrics.html").is_file()
          assert files("obs_web_widgets").joinpath("templates", "amll.html").is_file()
          assert files("obs_web_widgets").joinpath("templates", "countdown.html").is_file()
          assert now_playing_swift_path().endswith("now_playing.swift")
          PY

      - name: Upload tagged artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: obs-web-widgets-python-dist
          path: dist/*
